<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VaultGTA Setup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b0b0b; color: #e8e8f0;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    height: 100vh; display: flex; flex-direction: column;
    overflow: hidden; user-select: none;
  }
  .titlebar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px; background: #050508; flex-shrink: 0;
    -webkit-app-region: drag;
  }
  .titlebar .brand {
    font-family: 'Arial Black', sans-serif; font-size: 0.8rem;
    color: #d4a843; letter-spacing: 1px;
    display: flex; align-items: center; gap: 8px;
  }
  .titlebar .diamond {
    width: 14px; height: 14px;
    background: linear-gradient(135deg, #d4a843, #f0d68a);
    transform: rotate(45deg); border-radius: 2px;
  }
  .titlebar button {
    width: 28px; height: 22px; border: none;
    background: rgba(255,255,255,0.06); color: #555570;
    cursor: pointer; border-radius: 4px; font-size: 0.7rem;
    -webkit-app-region: no-drag;
  }
  .titlebar button:hover { background: rgba(255,255,255,0.15); color: #fff; }

  .main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 40px; gap: 22px;
  }
  .logo {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, #0a0a18, #1a1a30);
    border: 1px solid rgba(212,168,67,0.25);
    border-radius: 14px; position: relative;
    display: flex; align-items: center; justify-content: center;
    transform: rotate(45deg);
  }
  .logo::after {
    content: ''; width: 18px; height: 18px;
    background: linear-gradient(135deg, #d4a843, #f0d68a);
    border-radius: 3px; transform: rotate(45deg);
  }
  h1 { font-size: 1.6rem; font-weight: 700; color: #fff; }
  p.sub { color: #9090aa; font-size: 0.85rem; text-align: center; max-width: 360px; line-height: 1.6; }
  .card {
    background: rgba(15,15,30,0.55);
    border: 1px solid rgba(212,168,67,0.12);
    border-radius: 12px; padding: 16px 22px;
    display: flex; align-items: center; gap: 12px;
  }
  .card .check { font-size: 1.2rem; }
  .card .label { font-size: 0.7rem; color: #9090aa; text-transform: uppercase; letter-spacing: 1px; }
  .card .val { font-size: 0.82rem; color: #e8e8f0; }
  .btn {
    padding: 12px 36px; border-radius: 8px; font-size: 0.88rem;
    font-weight: 600; cursor: pointer; border: none;
    background: linear-gradient(135deg, #d4a843, #c49a2e);
    color: #0b0b0b; transition: all 0.15s;
  }
  .btn:hover { box-shadow: 0 0 20px rgba(212,168,67,0.35); transform: translateY(-1px); }
</style>
</head>
<body>
<div class="titlebar">
  <div class="brand"><div class="diamond"></div>VAULT GTA</div>
  <button onclick="close()">&#x2715;</button>
</div>
<div class="main">
  <div class="logo"></div>
  <h1>Welcome to VaultGTA</h1>
  <p class="sub">GTA Online Vehicle Collection Tracker &mdash; Your garage, beautifully organized.</p>
  <div class="card">
    <span class="check">&#10003;</span>
    <div>
      <span class="label">Installation Complete</span>
      <div class="val">VaultGTA v10.26.1 is ready</div>
    </div>
  </div>
  <button class="btn" onclick="getStarted()">Get Started</button>
</div>
<script>
function getStarted() { window.electron.send('setup:done'); }
function close() { window.electron.send('setup:close'); }
</script>
</body>
</html>
