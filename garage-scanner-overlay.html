<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }
    #frame {
      width: 100%; height: 100%;
      border: 2px dashed rgba(212, 168, 67, 0.6);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      background: rgba(7, 7, 13, 0.85);
      border-bottom: 1px solid rgba(212, 168, 67, 0.2);
      -webkit-app-region: no-drag;
      flex-shrink: 0;
    }
    .btn {
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-family: 'Microsoft YaHei', sans-serif;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .btn-scan {
      background: #d4a843;
      color: #07070d;
      font-weight: bold;
    }
    .btn-scan:hover { background: #f0d68a; }
    .btn-scan.scanning {
      background: #e74c3c;
      animation: pulse 1s ease-in-out infinite;
    }
    .btn-close {
      background: transparent;
      color: #9090aa;
      border-color: rgba(212,168,67,0.2);
      margin-left: auto;
    }
    .btn-close:hover { color: #e74c3c; border-color: #e74c3c; }
    #status {
      color: #9090aa;
      font-size: 10px;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      -webkit-app-region: no-drag;
    }
    #scan-area {
      flex: 1;
      background: rgba(20, 20, 35, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(212, 168, 67, 0.2);
      font-size: 13px;
      font-family: 'Microsoft YaHei', sans-serif;
      -webkit-app-region: no-drag;
    }
    #resize-handle {
      position: absolute;
      right: 0; bottom: 0;
      width: 16px; height: 16px;
      cursor: nwse-resize;
      -webkit-app-region: no-drag;
    }
    #resize-handle::after {
      content: '';
      position: absolute;
      right: 3px; bottom: 3px;
      width: 8px; height: 8px;
      border-right: 2px solid rgba(212,168,67,0.4);
      border-bottom: 2px solid rgba(212,168,67,0.4);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
  </style>
</head>
<body>
<div id="frame">
  <div id="toolbar">
    <button class="btn btn-scan" id="btn-scan" title="开始自动扫描车库">▶ 扫描</button>
    <span id="status">就绪</span>
    <button class="btn btn-close" id="btn-close" title="关闭悬浮窗">✕</button>
  </div>
  <div id="scan-area">
    <span>将此处对准车库列表</span>
  </div>
  <div id="resize-handle" title="拖动调整大小"></div>
</div>
</body>
</html>
