<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>VaultGTA - 重置密码</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#07070d; color:#e8e8e8;
    font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh;
  }
  .card {
    background:linear-gradient(180deg,#0d0d1a,#0b0b0b);
    border:1px solid #1e1e3a; border-radius:12px;
    padding:40px 32px; width:400px; max-width:90vw; text-align:center;
  }
  h1 { color:#d4a843; font-size:22px; letter-spacing:2px; margin-bottom:4px; }
  .sub { color:#666; font-size:12px; margin-bottom:24px; }
  h2 { font-size:16px; margin-bottom:8px; }
  p { color:#999; font-size:13px; line-height:1.6; margin-bottom:20px; }
  input {
    width:100%; padding:12px; background:rgba(255,255,255,0.06);
    border:1px solid #2a2a4a; border-radius:6px; color:#fff;
    font-size:14px; margin-bottom:12px; outline:none;
  }
  input:focus { border-color:#d4a843; }
  button {
    width:100%; padding:12px; background:linear-gradient(135deg,#d4a843,#c9952e);
    color:#0b0b0b; font-weight:bold; font-size:14px; border:none;
    border-radius:6px; cursor:pointer; letter-spacing:1px;
  }
  button:disabled { opacity:0.6; cursor:not-allowed; }
  .msg { font-size:12px; margin-top:12px; }
  .msg.error { color:#e74c3c; }
  .msg.success { color:#27ae60; }
  .done { display:none; }
</style>
</head>
<body>
<div class="card">
  <h1>VAULTGTA</h1>
  <div class="sub">GTA Online 载具收藏管理</div>

  <div id="form-view">
    <h2>设置新密码</h2>
    <p>请输入你的新密码。</p>
    <input type="password" id="password" placeholder="新密码（至少6位）" minlength="6">
    <input type="password" id="confirm" placeholder="确认密码">
    <button id="btn-submit" onclick="handleReset()">确认重置</button>
    <div class="msg" id="msg"></div>
  </div>

  <div class="done" id="done-view">
    <div style="font-size:40px;margin-bottom:12px;">✅</div>
    <h2>密码已重置</h2>
    <p>请返回 VaultGTA 桌面软件，用新密码登录。</p>
  </div>
</div>

<script>
// Load Supabase from local server (same as main app)
var script = document.createElement('script');
script.src = '/vendor/supabase/supabase.js';
script.onload = function() {
  var sb = supabase.createClient(
    'https://dfchvbffwmuxvdwmqwwx.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmY2h2YmZmd211eHZkd21xd3d4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMDM0NzksImV4cCI6MjA5ODY3OTQ3OX0.ut2xMOFBu9VrZOVQgjTd-S_p6LY_h9Ue6R-azaWDjzg'
  );

  // Process recovery hash from URL
  var hash = window.location.hash;
  if (hash) {
    // Supabase puts tokens in URL hash after recovery redirect
    var params = new URLSearchParams(hash.substring(1));
    var accessToken = params.get('access_token');
    var refreshToken = params.get('refresh_token');
    if (accessToken && refreshToken) {
      sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken })
        .then(function (r) {
          if (r.error) {
            console.error('Session error:', r.error);
            showMsg('链接已过期，请重新申请重置', 'error');
            document.getElementById('form-view').style.display = 'none';
          }
        })
        .catch(function () {
          showMsg('链接无效或已过期', 'error');
          document.getElementById('form-view').style.display = 'none';
        });
    }
  }

  window.handleReset = function () {
    var pw = document.getElementById('password').value;
    var cf = document.getElementById('confirm').value;
    var btn = document.getElementById('btn-submit');

    if (pw.length < 6) { showMsg('密码至少6位', 'error'); return; }
    if (pw !== cf) { showMsg('两次密码不一致', 'error'); return; }

    btn.disabled = true;
    btn.textContent = '处理中...';

    sb.auth.updateUser({ password: pw }).then(function (r) {
      if (r.error) {
        showMsg('保存失败：' + (r.error.message || '请重试'), 'error');
        btn.disabled = false;
        btn.textContent = '确认重置';
      } else {
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('done-view').style.display = 'block';
      }
    }).catch(function () {
      showMsg('网络错误，请重试', 'error');
      btn.disabled = false;
      btn.textContent = '确认重置';
    });
  };

  function showMsg(text, type) {
    var el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + (type || '');
  }
};
document.head.appendChild(script);
</script>
</body>
</html>
